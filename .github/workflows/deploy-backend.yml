name: Build and Publish Backend

on:
  push:
    branches: ["main", "leandroPII"]
    paths:
      - "Dockerfile"
      - "pom.xml"
      - "src/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apalabrazos:latest
            ghcr.io/${{ github.repository_owner }}/apalabrazos:${{ github.sha }}
