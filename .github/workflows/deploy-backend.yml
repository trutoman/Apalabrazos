name: Build and Publish Backend

on:
  push:
    branches: ["main", "leandroPII-phaser"]
    paths:
      - "Dockerfile"
      - "pom.xml"
      - "src/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-backend.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apalabrazos:latest
            ghcr.io/${{ github.repository_owner }}/apalabrazos:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: docker
    environment: digitalocean-server
    permissions:
      contents: read
      packages: read
    concurrency:
      group: apalabrazos-prod-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .env from GitHub Secrets
        run: |
          set -eu
          cat > .env <<EOF
          GHCR_OWNER=${{ github.repository_owner }}
          COSMOS_DB_ENDPOINT=${{ secrets.COSMOS_DB_ENDPOINT }}
          COSMOS_DB_KEY=${{ secrets.COSMOS_DB_KEY }}
          COSMOS_DB_DATABASE=${{ secrets.COSMOS_DB_DATABASE }}
          COSMOS_DB_QUESTIONS_CONTAINER=${{ vars.COSMOS_DB_QUESTIONS_CONTAINER }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ISSUER=${{ vars.JWT_ISSUER }}
          JWT_AUDIENCE=${{ vars.JWT_AUDIENCE }}
          JWT_EXP_MINUTES=${{ vars.JWT_EXP_MINUTES }}
          SEED_QUESTIONS_ON_START=${{ vars.SEED_QUESTIONS_ON_START }}
          QUESTIONS_SEED_FILE=${{ vars.QUESTIONS_SEED_FILE }}
          JAVA_OPTS=${{ vars.JAVA_OPTS }}
          AI_GENERATOR_ENABLED=${{ vars.AI_GENERATOR_ENABLED }}
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_API_URL=${{ vars.AI_API_URL }}
          AI_MODEL=${{ vars.AI_MODEL }}
          AI_MAX_TOKENS=${{ vars.AI_MAX_TOKENS }}
          AI_QUESTIONS_PER_LETTER=${{ vars.AI_QUESTIONS_PER_LETTER }}
          AI_GENERATOR_HOUR=${{ vars.AI_GENERATOR_HOUR }}
          AI_GENERATOR_MINUTE=${{ vars.AI_GENERATOR_MINUTE }}
          AI_GENERATOR_TIMEZONE=${{ vars.AI_GENERATOR_TIMEZONE }}
          AI_GENERATOR_OUTPUT_DIR=${{ vars.AI_GENERATOR_OUTPUT_DIR }}
          AI_GENERATOR_FILENAME=${{ vars.AI_GENERATOR_FILENAME }}
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart with new image
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env pull
          docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans
